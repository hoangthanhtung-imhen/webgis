<!DOCTYPE html>
<html>
<head>
  <title>WebGIS - SVD</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<h3 style="text-align:center;">Bản đồ Sân vận động</h3>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Khởi tạo bản đồ
  var map = L.map('map').setView([16, 108], 6);

  // Nền OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // Hàm style
  function style(feature) {
    return {
      color: "red",
      weight: 2,
      fillOpacity: 0.5
    };
  }

  // Popup cho từng đối tượng
  function onEachFeature(feature, layer) {
    if (feature.properties) {
      let content = "";
      for (let key in feature.properties) {
        content += "<b>" + key + ":</b> " + feature.properties[key] + "<br>";
      }
      layer.bindPopup(content);
    }
  }

  // Load GeoJSON từ GitHub (RAW)
  fetch('https://raw.githubusercontent.com/hoangthanhtung-imhen/webgis/main/SVD.geojson')
    .then(response => response.json())
    .then(data => {
      var geoLayer = L.geoJSON(data, {
        style: style,
        onEachFeature: onEachFeature
      }).addTo(map);

      // Zoom tới dữ liệu
      map.fitBounds(geoLayer.getBounds());
    })
    .catch(error => console.error("Lỗi load GeoJSON:", error));

</script>

</body>
</html>
